name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: false
        default: "1.0.1"
      publish_docker:
        description: "Build and push ghcr.io image"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  release-meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      publish_docker: ${{ steps.meta.outputs.publish_docker }}
    steps:
      - name: Resolve version + tag
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_PUBLISH_DOCKER: ${{ github.event.inputs.publish_docker || '' }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            PUBLISH_DOCKER="true"
          else
            VERSION="${INPUT_VERSION:-1.0.0}"
            TAG="v${VERSION}"
            if [[ "${INPUT_PUBLISH_DOCKER}" == "true" ]]; then
              PUBLISH_DOCKER="true"
            else
              PUBLISH_DOCKER="false"
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "publish_docker=${PUBLISH_DOCKER}" >> "$GITHUB_OUTPUT"

  package-source:
    name: Package Source + Python Wheel
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build source package zip
        env:
          NOVABRIDGE_BUILD_WHEEL: "0"
          NOVABRIDGE_BUILD_DOCKER: "0"
        run: |
          chmod +x scripts/package_release.sh
          scripts/package_release.sh "${{ needs.release-meta.outputs.version }}"

      - name: Build Python wheel
        run: |
          python -m build --wheel --outdir dist/python-sdk python-sdk

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-source-assets
          path: |
            dist/NovaBridge-v*.zip
            dist/python-sdk/*.whl
          if-no-files-found: error

  build-macos-arm64:
    name: Build Plugin (macOS ARM64)
    needs: release-meta
    if: ${{ vars.ENABLE_RELEASE_SELF_HOSTED_BUILDS == 'true' }}
    runs-on: [self-hosted, macOS, ARM64, unreal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        shell: bash
        env:
          UE_ROOT_INPUT: ${{ vars.UE_ROOT_MAC || '' }}
        run: |
          chmod +x scripts/ci/build_plugin_mac.sh
          scripts/ci/build_plugin_mac.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/release-macos-arm64" "$UE_ROOT_INPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-macos-arm64
          path: |
            ${{ runner.temp }}/release-macos-arm64/*.zip
            ${{ runner.temp }}/release-macos-arm64/**/manifest.txt
          if-no-files-found: error

  build-macos-x64:
    name: Build Plugin (macOS x64)
    needs: release-meta
    if: ${{ vars.ENABLE_RELEASE_SELF_HOSTED_BUILDS == 'true' && vars.ENABLE_RELEASE_MAC_INTEL == 'true' }}
    runs-on: [self-hosted, macOS, X64, unreal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        shell: bash
        env:
          UE_ROOT_INPUT: ${{ vars.UE_ROOT_MAC_INTEL || vars.UE_ROOT_MAC || '' }}
        run: |
          chmod +x scripts/ci/build_plugin_mac.sh
          scripts/ci/build_plugin_mac.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/release-macos-x64" "$UE_ROOT_INPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-macos-x64
          path: |
            ${{ runner.temp }}/release-macos-x64/*.zip
            ${{ runner.temp }}/release-macos-x64/**/manifest.txt
          if-no-files-found: error

  build-windows-x64:
    name: Build Plugin (Windows x64)
    needs: release-meta
    if: ${{ vars.ENABLE_RELEASE_SELF_HOSTED_BUILDS == 'true' }}
    runs-on: [self-hosted, Windows, X64, unreal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        shell: pwsh
        env:
          UE_ROOT_INPUT: ${{ vars.UE_ROOT_WIN || '' }}
        run: |
          ./scripts/ci/build_plugin_win.ps1 -RepoRoot "$env:GITHUB_WORKSPACE" -OutputRoot "$env:RUNNER_TEMP/release-win64" -UERootOverride "$env:UE_ROOT_INPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-win64
          path: |
            ${{ runner.temp }}/release-win64/*.zip
            ${{ runner.temp }}/release-win64/**/manifest.txt
          if-no-files-found: error

  build-linux-x64:
    name: Build Plugin (Linux x64)
    needs: release-meta
    if: ${{ vars.ENABLE_RELEASE_SELF_HOSTED_BUILDS == 'true' }}
    runs-on: [self-hosted, Linux, X64, unreal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        shell: bash
        env:
          UE_ROOT_INPUT: ${{ vars.UE_ROOT_LINUX || '' }}
        run: |
          chmod +x scripts/ci/build_plugin_linux.sh
          scripts/ci/build_plugin_linux.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/release-linux-x64" "$UE_ROOT_INPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux-x64
          path: |
            ${{ runner.temp }}/release-linux-x64/*.zip
            ${{ runner.temp }}/release-linux-x64/**/manifest.txt
          if-no-files-found: error

  build-linux-arm64:
    name: Build Plugin (Linux ARM64)
    needs: release-meta
    if: ${{ vars.ENABLE_RELEASE_SELF_HOSTED_BUILDS == 'true' && vars.ENABLE_RELEASE_LINUX_ARM64 == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, unreal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        shell: bash
        env:
          UE_ROOT_INPUT: ${{ vars.UE_ROOT_LINUX_ARM64 || vars.UE_ROOT_LINUX || '' }}
        run: |
          chmod +x scripts/ci/build_plugin_linux.sh
          scripts/ci/build_plugin_linux.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/release-linux-arm64" "$UE_ROOT_INPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux-arm64
          path: |
            ${{ runner.temp }}/release-linux-arm64/*.zip
            ${{ runner.temp }}/release-linux-arm64/**/manifest.txt
          if-no-files-found: error

  publish-docker:
    name: Publish Docker Image
    needs: [release-meta, package-source]
    if: ${{ needs.release-meta.outputs.publish_docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/maddwiz/novabridge:${{ needs.release-meta.outputs.version }}
            ghcr.io/maddwiz/novabridge:latest

  github-release:
    name: Publish GitHub Release
    needs:
      - release-meta
      - package-source
      - publish-docker
      - build-macos-arm64
      - build-macos-x64
      - build-windows-x64
      - build-linux-x64
      - build-linux-arm64
    if: ${{ always() && needs.package-source.result == 'success' && (needs.publish-docker.result == 'success' || needs.publish-docker.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download source artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-source-assets
          path: dist

      - name: Download optional plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: dist/plugin-binaries
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: NovaBridge ${{ needs.release-meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.whl
          fail_on_unmatched_files: false
