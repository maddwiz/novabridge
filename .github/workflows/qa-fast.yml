name: QA Fast Checks

on:
  push:
    branches: ["main"]
    paths:
      - "python-sdk/**"
      - "mcp-server/**"
      - "novabridge-studio/**"
      - "assistant-server/**"
      - ".github/workflows/qa-fast.yml"
  pull_request:
    paths:
      - "python-sdk/**"
      - "mcp-server/**"
      - "novabridge-studio/**"
      - "assistant-server/**"
      - ".github/workflows/qa-fast.yml"
  workflow_dispatch:

jobs:
  python-tests:
    name: Python SDK + MCP Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run python-sdk tests
        run: python -m unittest discover -s python-sdk/tests -p "test_*.py"

      - name: Run mcp-server tests
        run: python -m unittest discover -s mcp-server/tests -p "test_*.py"

  studio-tests:
    name: NovaBridge Studio Tests + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novabridge-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run studio unit tests
        run: npm test

      - name: Build studio
        run: npm run build

  assistant-server-check:
    name: Assistant Server Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check assistant server
        run: |
          node --check assistant-server/command_catalog.js
          node --check assistant-server/assistant_engine.js
          node --check assistant-server/server.js
